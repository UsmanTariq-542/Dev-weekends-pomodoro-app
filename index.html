<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pomodoro Timer</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="app-shell">
		<section class="timer-card" aria-labelledby="timer-heading">
			<div class="timer-card__header">
				<h1 id="timer-heading">Pomodoro Timer</h1>
				<p>Work in focused sprints and take deliberate breaks.</p>
			</div>

			<div class="timer-circle" aria-labelledby="mode-label" aria-live="polite" aria-atomic="true">
				<p id="mode-label" class="timer-mode">Focus</p>
				<output id="time-display" class="timer-display" aria-label="Time remaining">25:00</output>
			</div>

			<div class="timer-controls" aria-label="Timer controls">
				<button type="button" id="start-pause-btn">Start</button>
				<button type="button" id="reset-btn">Reset</button>
			</div>

			<section class="settings-panel" aria-labelledby="settings-heading">
				<h2 id="settings-heading">Configuration</h2>

				<form id="settings-form" class="settings-form">
					<label for="task-input">Task</label>
					<input id="task-input" name="task" type="text" placeholder="Optional task name">

					<label for="focus-minutes">Focus minutes</label>
					<input id="focus-minutes" name="focusMinutes" type="number" min="1" step="1" value="25">

					<label for="break-minutes">Break minutes</label>
					<input id="break-minutes" name="breakMinutes" type="number" min="1" step="1" value="5">

					<button type="submit">Apply settings</button>
				</form>
			</section>

			<section class="history-panel" aria-labelledby="history-heading">
				<h2 id="history-heading">History</h2>
				<ul id="history-list" class="history-list" aria-live="polite" aria-relevant="additions"></ul>
			</section>
		</section>
	</main>

	<script src="app.js"></script>
</body>
</html>
